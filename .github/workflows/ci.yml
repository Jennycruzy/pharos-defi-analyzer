name: CI

# Guards the live invariants on every push/PR: strict typecheck + the live
# mainnet test suite (no mocks) + the golden-snapshot regression.
#
# OPTIONAL SECRET — PHAROS_WATCH_API_KEY
# The Pharos Watch [api] nav test self-SKIPS (never fails, never fakes) unless a
# real key is provided. To exercise that branch in CI, add the secret once:
#
#   gh secret set PHAROS_WATCH_API_KEY            # paste the key when prompted
#   # or: GitHub → repo → Settings → Secrets and variables → Actions → New repository secret
#         Name: PHAROS_WATCH_API_KEY   Value: <your key from https://pharos.watch/api/>
#
# Without the secret CI still passes (the [api] test just skips). The secret is
# never printed; it is only read into the job env below.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pharos-rwa-analyzer
    env:
      # Optional. If the secret is unset this is empty and the [api] test self-skips.
      PHAROS_WATCH_API_KEY: ${{ secrets.PHAROS_WATCH_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pharos-rwa-analyzer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Report Pharos Watch key status (no secret printed)
        run: |
          if [ -n "$PHAROS_WATCH_API_KEY" ]; then
            echo "PHAROS_WATCH_API_KEY is set — the [api] nav test will run."
          else
            echo "PHAROS_WATCH_API_KEY not set — the [api] nav test will self-skip (CI still passes)."
          fi

      - name: Typecheck (strict)
        run: npm run typecheck

      - name: Live tests (Pharos mainnet, no mocks) + golden snapshot
        run: npm test
