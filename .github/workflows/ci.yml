name: CI

# Guards the live invariants on every push/PR: strict typecheck + the live
# mainnet test suite (no mocks). The keyed Pharos Watch [api] test self-skips
# unless PHAROS_WATCH_API_KEY is provided as a repo secret.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pharos-rwa-analyzer
    env:
      PHAROS_WATCH_API_KEY: ${{ secrets.PHAROS_WATCH_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: pharos-rwa-analyzer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (strict)
        run: npm run typecheck

      - name: Live tests (Pharos mainnet, no mocks)
        run: npm test
